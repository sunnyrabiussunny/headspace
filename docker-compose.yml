services:

  backend:
    build: ./backend
    container_name: headspace_backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/headspace.db
      - BACKUP_DIR=/app/data/backups
      - SECRET_KEY=${SECRET_KEY:-headspace-secret-change-me}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: headspace_frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: headspace_nginx
    restart: unless-stopped
    ports:
      - "5151:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
